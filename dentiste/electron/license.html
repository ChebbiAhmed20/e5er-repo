<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Virela - Activation de licence</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';" />
    <style>
      * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        background: #f5f7fb;
        color: #1f2933;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
      }
      .card {
        background: #ffffff;
        border-radius: 12px;
        padding: 24px 28px;
        box-shadow: 0 10px 30px rgba(15, 35, 52, 0.12);
        width: 100%;
        max-width: 460px;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
      }
      .subtitle {
        font-size: 13px;
        color: #6b7280;
        margin-bottom: 16px;
      }
      .status {
        margin-bottom: 16px;
        padding: 10px 12px;
        border-radius: 8px;
        background: #f3f4ff;
        color: #3730a3;
        font-size: 13px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .status.expired {
        background: #fef2f2;
        color: #b91c1c;
      }
      .status-label {
        font-weight: 500;
      }
      .status-value {
        font-weight: 600;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
      }
      input[type="text"] {
        width: 100%;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 13px;
        outline: none;
      }
      input[type="text"]:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 1px #4f46e5;
      }
      .hint {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 4px;
        margin-bottom: 12px;
      }
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: none;
        border-radius: 999px;
        padding: 8px 18px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        background: #4f46e5;
        color: #ffffff;
      }
      button:disabled {
        opacity: 0.7;
        cursor: default;
      }
      .footer {
        margin-top: 14px;
        font-size: 11px;
        color: #6b7280;
      }
      .footer code {
        background: #f3f4f6;
        padding: 1px 4px;
        border-radius: 4px;
        font-size: 10px;
      }
      .error {
        margin-top: 8px;
        font-size: 12px;
        color: #b91c1c;
      }
      .success {
        margin-top: 8px;
        font-size: 12px;
        color: #15803d;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="title">Licence requise</div>
      <div class="subtitle">Votre essai de 30 jours est termine. Veuillez saisir une cle de licence pour continuer a utiliser Virela.</div>

      <div id="status" class="status">
        <span class="status-label">Verification du statut…</span>
        <span class="status-value"></span>
      </div>

      <div>
        <label for="licenseKey">Cle de licence</label>
        <input
          id="licenseKey"
          type="text"
          autocomplete="off"
        />
        <div class="hint">Collez la cle fournie par le support Virela. La licence est liee a cet ordinateur.</div>
      </div>

      <button id="activateBtn">Activer la licence</button>

      <div id="message" class=""></div>

    </div>

    <script>
      const statusEl = document.getElementById('status');
      const statusLabelEl = statusEl.querySelector('.status-label');
      const statusValueEl = statusEl.querySelector('.status-value');
      const messageEl = document.getElementById('message');
      const keyInput = document.getElementById('licenseKey');
      const activateBtn = document.getElementById('activateBtn');

      async function refreshStatus() {
        try {
          const status = await window.desktop.licensing.getStatus();

          if (!status) {
            statusLabelEl.textContent = 'Statut inconnu';
            statusValueEl.textContent = '';
            statusEl.classList.add('expired');
            return;
          }

          if (status.licenseValid) {
            statusLabelEl.textContent = 'Statut de licence';
            statusValueEl.textContent = 'Activee';
            statusEl.classList.remove('expired');
            return;
          }

          if (status.trialValid) {
            statusLabelEl.textContent = 'Essai restant';
            statusValueEl.textContent = (status.daysRemaining || 0) + ' jours';
            statusEl.classList.remove('expired');
            return;
          }

          statusLabelEl.textContent = 'Acces bloque';
          statusValueEl.textContent = 'Essai expire';
          statusEl.classList.add('expired');
        } catch (err) {
          statusLabelEl.textContent = 'Erreur de lecture du statut';
          statusValueEl.textContent = '';
          statusEl.classList.add('expired');
          console.error(err);
        }
      }

      async function activate() {
        const key = keyInput.value.trim();
        if (!key) {
          showMessage('Veuillez saisir une cle de licence.', false);
          return;
        }

        messageEl.textContent = '';
        messageEl.className = '';

        activateBtn.disabled = true;
        activateBtn.textContent = 'Activation…';

        try {
          const result = await window.desktop.licensing.activate(key);
          if (result && result.success) {
            showMessage('Licence activee. Ouverture de l\'application…', true);
            // Main process will open the main window and close this window.
          } else {
            showMessage((result && result.message) || 'Echec de l\'activation.', false);
          }
        } catch (err) {
          console.error(err);
          showMessage('Echec de l\'activation. Verifiez la cle et reessayez.', false);
        } finally {
          activateBtn.disabled = false;
          activateBtn.textContent = 'Activer la licence';
          refreshStatus();
        }
      }

      function showMessage(text, success) {
        messageEl.textContent = text;
        messageEl.className = success ? 'success' : 'error';
      }

      activateBtn.addEventListener('click', activate);
      keyInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          activate();
        }
      });

      refreshStatus();
    </script>
  </body>
  </html>
